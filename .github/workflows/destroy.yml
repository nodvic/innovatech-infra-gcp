name: Terraform Destroy

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: self-hosted
    env:
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_zone: ${{ vars.GCP_ZONE }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_peer_gateway_ip_0: ${{ vars.GCP_PEER_IP_0 }}
      TF_VAR_peer_gateway_ip_1: ${{ vars.GCP_PEER_IP_1 }}
      TF_VAR_vpn_shared_secret: ${{ secrets.VPN_SHARED_SECRET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ./environments/prod

      - name: Destroy Apps and Database
        run: terraform destroy -target="module.database" -target="module.soar" -auto-approve
        working-directory: ./environments/prod
        continue-on-error: true

      - name: Force Cleanup Service Networking
        shell: powershell
        run: |
          Write-Host "Forceer verwijdering van de Service Networking Peering..."
          $ErrorActionPreference = "SilentlyContinue"
          gcloud compute networks peerings delete servicenetworking-googleapis-com --network=innovatech-vpc-spoke-prod --project=${{ vars.GCP_PROJECT_ID }} --quiet
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Peering was waarschijnlijk al weg of kon niet worden gevonden. We gaan door..."
          }

      - name: Wait for GCP Release
        shell: powershell
        run: Start-Sleep -s 60

      - name: Final Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./environments/prod
